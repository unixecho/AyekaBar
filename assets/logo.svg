<svg viewBox="0 0 480 480" role="img" aria-label="אייכה בר — Ayeka Bar" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ay-face" cx="42%" cy="33%" r="78%">
      <stop offset="0" stop-color="#eccb95"/>
      <stop offset="46%" stop-color="#cf9456"/>
      <stop offset="100%" stop-color="#794c24"/>
    </radialGradient>
    <linearGradient id="ay-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6ba7c"/>
      <stop offset="50%" stop-color="#9c6630"/>
      <stop offset="100%" stop-color="#5b3a1a"/>
    </linearGradient>
    <linearGradient id="ay-letter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fce7c4"/>
      <stop offset="100%" stop-color="#d59b54"/>
    </linearGradient>
  </defs>

  <!-- coin body + rings -->
  <circle cx="240" cy="240" r="234" fill="url(#ay-rim)"/>
  <circle cx="240" cy="240" r="234" fill="none" stroke="#4d3014" stroke-width="2" opacity=".55"/>
  <circle cx="240" cy="240" r="214" fill="none" stroke="#3c2510" stroke-width="13"
          stroke-dasharray="1.5 11" stroke-linecap="round" opacity=".5"/>
  <circle cx="240" cy="240" r="203" fill="url(#ay-face)"/>
  <circle cx="240" cy="240" r="184" fill="none" stroke="#6c431f" stroke-width="2.4" opacity=".6"/>

  <g fill="#5d3a1a">
    <!-- top compass sparkle -->
    <path d="M240 92 l7.5 24 24 7.5 -24 7.5 -7.5 24 -7.5 -24 -24 -7.5 24 -7.5 z"/>
    <circle cx="196" cy="123" r="3"/>
    <circle cx="284" cy="123" r="3"/>
    <!-- side diamonds beside AYEKA BAR -->
    <path d="M150 312 l6 6 -6 6 -6 -6 z"/>
    <path d="M330 312 l6 6 -6 6 -6 -6 z"/>
    <!-- divider dots under the wordmark -->
    <circle cx="216" cy="336" r="2.4"/>
    <circle cx="240" cy="336" r="2.4"/>
    <circle cx="264" cy="336" r="2.4"/>
  </g>

  <!-- Hebrew wordmark, embossed (dark base + bronze face) -->
  <text x="240" y="262" text-anchor="middle" font-family="Rubik, system-ui, sans-serif"
        font-weight="800" font-size="70" fill="#46290f" opacity=".5">אייכה בר</text>
  <text x="240" y="259" text-anchor="middle" font-family="Rubik, system-ui, sans-serif"
        font-weight="800" font-size="70" fill="url(#ay-letter)">אייכה בר</text>

  <!-- English wordmark -->
  <text x="240" y="306" text-anchor="middle" font-family="Rubik, system-ui, sans-serif"
        font-weight="700" font-size="27" letter-spacing="7" fill="#5d3a1a">AYEKA BAR</text>

  <!-- tagline -->
  <text x="240" y="364" text-anchor="middle" font-family="Rubik, system-ui, sans-serif"
        font-weight="600" font-size="15" letter-spacing="2.3" fill="#5d3a1a">PREMIUM COCKTAIL LOUNGE</text>
</svg>
