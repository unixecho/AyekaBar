<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>אייכה בר</title>
<meta name="description" content="אייכה בר — חריש. תפריט דיגיטלי, ניווט, אינסטגרם וביקורות." />
<!-- TODO: per BRAND.md, swap Rubik to self-hosted woff2 subsets (assets/fonts/) and drop this CDN. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --bg-elev: #141420;
    --bg-elev-2: #1d1d2b;
    --neon: #ff5e3a;
    --neon-soft: #ff8a5c;
    --neon-2: #38e1ff;
    --text: #f5f3ef;
    --text-dim: #a8a5b0;
    --text-faint: #6a6776;
    --line: rgba(245, 243, 239, 0.08);
    --line-strong: rgba(245, 243, 239, 0.14);
    --glow: 0 0 28px rgba(255, 94, 58, 0.5);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Rubik", system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0; z-index: -2;
    background:
      radial-gradient(55% 40% at 80% -5%, rgba(255, 94, 58, 0.20), transparent 70%),
      radial-gradient(50% 38% at 12% 2%, rgba(56, 225, 255, 0.12), transparent 72%),
      radial-gradient(90% 60% at 50% 112%, rgba(255, 94, 58, 0.10), transparent 70%);
    pointer-events: none;
  }
  /* slow ambient drift */
  body::after {
    content: "";
    position: fixed; inset: -20%; z-index: -1;
    background: radial-gradient(35% 35% at 50% 50%, rgba(255, 94, 58, 0.06), transparent 70%);
    pointer-events: none;
    animation: drift 18s var(--ease) infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate(-6%, -4%) scale(1); }
    100% { transform: translate(6%, 5%) scale(1.15); }
  }

  /* ---- language switcher (globe → expand), pinned physical LEFT ---- */
  .lang { position: fixed; left: 14px; top: 14px; z-index: 50; }
  .globe {
    width: 42px; height: 42px;
    display: grid; place-items: center;
    border-radius: 13px;
    border: 1px solid var(--line);
    background: rgba(20, 20, 32, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--text);
    cursor: pointer;
    transition: border-color .25s var(--ease), box-shadow .3s var(--ease), background .25s var(--ease);
  }
  .globe:hover { border-color: rgba(56, 225, 255, 0.5); }
  .lang.open .globe { border-color: var(--neon-2); box-shadow: 0 0 18px rgba(56, 225, 255, 0.4); }
  .globe svg { width: 22px; height: 22px; }
  .lang-menu {
    position: absolute; top: 50px; left: 0;
    min-width: 138px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line-strong);
    border-radius: 14px;
    padding: 6px;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
    display: flex; flex-direction: column; gap: 2px;
    opacity: 0; transform: translateY(-8px) scale(0.96);
    transform-origin: top left; pointer-events: none;
    transition: opacity .26s var(--ease), transform .26s var(--ease);
  }
  .lang.open .lang-menu { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .lang-opt {
    appearance: none; border: 0; background: transparent;
    color: var(--text-dim); text-align: start; font: inherit; font-weight: 500;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    transition: background .2s var(--ease), color .2s var(--ease);
  }
  .lang-opt:hover { background: rgba(255, 255, 255, 0.05); color: var(--text); }
  .lang-opt.active { color: var(--text); background: rgba(255, 94, 58, 0.14); box-shadow: inset 0 0 0 1px rgba(255, 94, 58, 0.3); }

  /* ---- main ---- */
  main {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; max-width: 440px; margin: 0 auto;
    padding: 48px 22px 36px;
    text-align: center;
  }

  .brandwrap { margin-bottom: 38px; }
  .logo {
    width: 96px; height: 96px; margin: 0 auto 20px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: radial-gradient(circle at 50% 35%, rgba(255, 94, 58, 0.22), rgba(20,20,32,0.6));
    border: 1px solid rgba(255, 94, 58, 0.3);
    box-shadow: 0 0 40px rgba(255, 94, 58, 0.35), inset 0 0 24px rgba(255, 94, 58, 0.15);
  }
  .logo span { font-size: 2.6rem; font-weight: 900; color: var(--neon-soft); text-shadow: var(--glow); line-height: 1; }
  .brand {
    font-weight: 900; font-size: 2.6rem; letter-spacing: 1px; line-height: 1.05;
    text-shadow: 0 0 26px rgba(255, 94, 58, 0.6), 0 0 3px rgba(255, 138, 92, 0.7);
  }
  .brand .dot { color: var(--neon); }
  .tagline { margin-top: 10px; color: var(--text-dim); font-size: 0.98rem; font-weight: 400; }

  .actions { width: 100%; display: flex; flex-direction: column; gap: 13px; }

  .btn {
    display: flex; align-items: center; gap: 14px;
    width: 100%;
    padding: 17px 20px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: rgba(20, 20, 32, 0.7);
    color: var(--text);
    text-decoration: none;
    font-size: 1.06rem; font-weight: 600;
    cursor: pointer;
    transition: transform .2s var(--ease), border-color .25s var(--ease),
      background .25s var(--ease), box-shadow .3s var(--ease);
  }
  .btn .ic { width: 26px; height: 26px; flex: 0 0 auto; color: var(--neon-soft); display: grid; place-items: center; }
  .btn .ic svg { width: 24px; height: 24px; }
  .btn .label { flex: 1; text-align: start; }
  .btn .arrow { width: 18px; height: 18px; color: var(--text-faint); transition: transform .25s var(--ease), color .25s var(--ease); }
  .btn:hover { border-color: var(--line-strong); background: var(--bg-elev-2); transform: translateY(-2px); }
  .btn:hover .arrow { color: var(--neon-soft); }
  .btn:active { transform: translateY(0) scale(0.99); }

  /* hero = digital menu */
  .btn.hero {
    background: linear-gradient(135deg, var(--neon), var(--neon-soft));
    border-color: transparent;
    color: #fff;
    font-weight: 700;
    box-shadow: var(--glow);
  }
  .btn.hero .ic, .btn.hero .arrow { color: #fff; }
  .btn.hero:hover { box-shadow: 0 0 36px rgba(255, 94, 58, 0.7); background: linear-gradient(135deg, #ff6a47, #ff9568); }

  footer { text-align: center; color: var(--text-faint); font-size: 0.82rem; padding: 0 16px 26px; }

  /* ---- entrance animation ---- */
  .anim { opacity: 0; transform: translateY(16px); }
  .ready .anim { animation: rise .7s var(--ease) forwards; animation-delay: var(--d, 0ms); }
  @keyframes rise { to { opacity: 1; transform: none; } }
  .ready .logo { animation: bloom 1s var(--ease) forwards; }
  @keyframes bloom {
    0%   { opacity: 0; transform: scale(0.8); box-shadow: 0 0 0 rgba(255,94,58,0); }
    60%  { opacity: 1; box-shadow: 0 0 60px rgba(255, 94, 58, 0.55), inset 0 0 24px rgba(255, 94, 58, 0.25); }
    100% { opacity: 1; transform: scale(1); box-shadow: 0 0 40px rgba(255, 94, 58, 0.35), inset 0 0 24px rgba(255, 94, 58, 0.15); }
  }

  @media (prefers-reduced-motion: reduce) {
    .anim { opacity: 1 !important; transform: none !important; animation: none !important; }
    .logo { animation: none !important; opacity: 1 !important; }
    body::after { animation: none; }
  }
</style>
</head>
<body>
  <div class="lang" id="lang">
    <button class="globe" id="globeBtn" aria-label="Language" aria-expanded="false" aria-haspopup="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"></circle>
        <path d="M3 12h18"></path>
        <path d="M12 3c2.5 2.5 3.8 5.8 3.8 9S14.5 18.5 12 21C9.5 18.5 8.2 15.2 8.2 12S9.5 5.5 12 3z"></path>
      </svg>
    </button>
    <div class="lang-menu" id="langMenu" role="menu"></div>
  </div>

  <main>
    <div class="brandwrap">
      <div class="logo anim" aria-hidden="true"><span>א</span></div>
      <h1 class="brand anim" id="brand" style="--d:90ms">אייכה<span class="dot"> ·</span> בר</h1>
      <p class="tagline anim" id="tagline" style="--d:180ms"></p>
    </div>

    <nav class="actions" id="actions" aria-label="links"></nav>
  </main>

  <footer class="anim" id="footer" style="--d:620ms"></footer>

  <script>
  (function () {
    "use strict";

    // ---- External destinations. Replace placeholders with real URLs. ----
    var LINKS = {
      navigate:  "#",            // ⚠️ placeholder — maps/Waze link (needs address/coords)
      menu:      "menu.html",    // internal — the digital menu
      instagram: "#",            // ⚠️ placeholder — Instagram profile
      review:    "#",            // ⚠️ placeholder — Google "write a review" link
    };

    var LANGS = ["he", "en", "ar"];
    var RTL = { he: true, ar: true, en: false };

    var I18N = {
      he: {
        tagline: "חריש · ישראל",
        navigate: "ניווט אלינו",
        menu: "תפריט דיגיטלי",
        instagram: "אינסטגרם",
        review: "השארת ביקורת",
        footer: "© אייכה בר",
        langName: "עברית",
      },
      en: {
        tagline: "Harish · Israel",
        navigate: "Navigate to us",
        menu: "Digital menu",
        instagram: "Instagram",
        review: "Leave a review",
        footer: "© Eicha Bar",
        langName: "English",
      },
      ar: {
        tagline: "حريش · إسرائيل",
        navigate: "الوصول إلينا",
        menu: "القائمة الرقمية",
        instagram: "إنستغرام",
        review: "اترك تقييماً",
        footer: "© إيخا بار",
        langName: "العربية",
      },
    };

    var ICONS = {
      navigate: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>',
      menu: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16"/><path d="M4 10h16"/><path d="M4 15h10"/><path d="M4 20h7"/></svg>',
      instagram: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>',
      review: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.7 5.5 6 .9-4.3 4.2 1 6-5.4-2.8-5.4 2.8 1-6L4.3 9.4l6-.9z"/></svg>',
    };
    var ARROW = '<svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';

    var ORDER = ["navigate", "menu", "instagram", "review"];

    var lang = localStorage.getItem("siteLanguage");
    if (LANGS.indexOf(lang) === -1) lang = "he";

    function render() {
      var t = I18N[lang];
      document.documentElement.lang = lang;
      document.documentElement.dir = RTL[lang] ? "rtl" : "ltr";
      document.getElementById("tagline").textContent = t.tagline;
      document.getElementById("footer").textContent = t.footer;

      // arrow flips with direction
      var arrowRot = RTL[lang] ? "rotate(180deg)" : "none";

      // language menu
      var lm = document.getElementById("langMenu");
      lm.innerHTML = "";
      LANGS.forEach(function (l) {
        var b = document.createElement("button");
        b.className = "lang-opt" + (l === lang ? " active" : "");
        b.type = "button";
        b.setAttribute("role", "menuitem");
        b.textContent = I18N[l].langName;
        b.addEventListener("click", function () {
          lang = l;
          localStorage.setItem("siteLanguage", l);
          closeLang();
          render();
        });
        lm.appendChild(b);
      });

      // action buttons
      var box = document.getElementById("actions");
      box.innerHTML = "";
      ORDER.forEach(function (key, i) {
        var a = document.createElement("a");
        a.className = "btn anim" + (key === "menu" ? " hero" : "");
        a.href = LINKS[key];
        a.style.setProperty("--d", (260 + i * 90) + "ms");
        if (key === "instagram" || key === "review" || key === "navigate") {
          a.target = "_blank"; a.rel = "noopener noreferrer";
        }
        a.innerHTML =
          '<span class="ic">' + ICONS[key] + "</span>" +
          '<span class="label">' + t[key] + "</span>" +
          ARROW;
        box.appendChild(a);
      });
      // flip arrows for direction
      Array.prototype.forEach.call(document.querySelectorAll(".btn .arrow"), function (el) {
        el.style.transform = arrowRot;
      });
    }

    // ---- language dropdown ----
    var langWrap = document.getElementById("lang");
    var globeBtn = document.getElementById("globeBtn");
    function openLang() { langWrap.classList.add("open"); globeBtn.setAttribute("aria-expanded", "true"); }
    function closeLang() { langWrap.classList.remove("open"); globeBtn.setAttribute("aria-expanded", "false"); }
    globeBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      langWrap.classList.contains("open") ? closeLang() : openLang();
    });
    document.addEventListener("click", function (e) { if (!langWrap.contains(e.target)) closeLang(); });
    document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeLang(); });

    render();
    // trigger entrance after first paint
    requestAnimationFrame(function () {
      requestAnimationFrame(function () { document.body.classList.add("ready"); });
    });
  })();
  </script>
</body>
</html>
