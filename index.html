<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<script>
  // Phones get a dedicated, separately-scaled portal. Redirect before paint.
  // Override with ?desktop=1 to force this desktop version on a phone.
  (function () {
    try {
      if (/[?&]desktop=1/.test(location.search)) return;
      var ua = navigator.userAgent || "";
      var phoneUA = /Mobi|Android|iPhone|iPod|Windows Phone|BlackBerry|Opera Mini|IEMobile/i.test(ua);
      var narrow = Math.min(screen.width || 9999, window.innerWidth || 9999) <= 820;
      if (phoneUA || narrow) location.replace("portal-mobile.html" + location.search);
    } catch (e) {}
  })();
</script>
<title>אייכה בר</title>
<meta name="description" content="אייכה בר — חריש. תפריט דיגיטלי, ניווט, אינסטגרם וביקורות." />
<!-- TODO: per BRAND.md, swap Rubik to self-hosted woff2 subsets (assets/fonts/) and drop this CDN. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --bg-elev: #141420;
    --bg-elev-2: #1d1d2b;
    --neon: #ff5e3a;
    --neon-soft: #ff8a5c;
    --neon-2: #38e1ff;
    --text: #f5f3ef;
    --text-dim: #a8a5b0;
    --text-faint: #6a6776;
    --line: rgba(245, 243, 239, 0.08);
    --line-strong: rgba(245, 243, 239, 0.14);
    --glow: 0 0 28px rgba(255, 94, 58, 0.5);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Rubik", system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-x: hidden;
  }
  /* ---- desktop photo background (phones use portal-mobile.html) ---- */
  .bg {
    position: fixed; inset: 0; z-index: -3;
    background-position: center; background-size: cover; background-repeat: no-repeat;
    background-image: url("assets/bg-desktop.jpg");
  }

  /* darkening scrim over the photo so text + buttons stay legible */
  body::before {
    content: "";
    position: fixed; inset: 0; z-index: -2;
    background:
      radial-gradient(120% 85% at 50% 42%, transparent 0%, rgba(10, 10, 15, 0.55) 100%),
      linear-gradient(to bottom,
        rgba(10, 10, 15, 0.70) 0%,
        rgba(10, 10, 15, 0.30) 26%,
        rgba(10, 10, 15, 0.42) 64%,
        rgba(10, 10, 15, 0.88) 100%);
    pointer-events: none;
  }
  /* slow ambient drift */
  body::after {
    content: "";
    position: fixed; inset: -20%; z-index: -1;
    background: radial-gradient(35% 35% at 50% 50%, rgba(255, 94, 58, 0.06), transparent 70%);
    pointer-events: none;
    animation: drift 18s var(--ease) infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate(-6%, -4%) scale(1); }
    100% { transform: translate(6%, 5%) scale(1.15); }
  }

  /* ---- language switcher (globe → expand), pinned physical LEFT ---- */
  .lang { position: fixed; left: 14px; top: 14px; z-index: 50; }
  .globe {
    width: 42px; height: 42px;
    display: grid; place-items: center;
    border-radius: 13px;
    border: 1px solid var(--line);
    background: rgba(20, 20, 32, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--text);
    cursor: pointer;
    transition: border-color .25s var(--ease), box-shadow .3s var(--ease), background .25s var(--ease);
  }
  .globe:hover { border-color: rgba(56, 225, 255, 0.5); }
  .lang.open .globe { border-color: var(--neon-2); box-shadow: 0 0 18px rgba(56, 225, 255, 0.4); }
  .globe svg { width: 22px; height: 22px; }
  .lang-menu {
    position: absolute; top: 50px; left: 0;
    min-width: 138px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line-strong);
    border-radius: 14px;
    padding: 6px;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
    display: flex; flex-direction: column; gap: 2px;
    opacity: 0; transform: translateY(-8px) scale(0.96);
    transform-origin: top left; pointer-events: none;
    transition: opacity .26s var(--ease), transform .26s var(--ease);
  }
  .lang.open .lang-menu { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .lang-opt {
    appearance: none; border: 0; background: transparent;
    color: var(--text-dim); text-align: start; font: inherit; font-weight: 500;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    transition: background .2s var(--ease), color .2s var(--ease);
  }
  .lang-opt:hover { background: rgba(255, 255, 255, 0.05); color: var(--text); }
  .lang-opt.active { color: var(--text); background: rgba(255, 94, 58, 0.14); box-shadow: inset 0 0 0 1px rgba(255, 94, 58, 0.3); }

  /* ---- main ---- */
  main {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; max-width: 440px; margin: 0 auto;
    padding: 48px 22px 36px;
    text-align: center;
  }

  .brandwrap { margin-bottom: 38px; }
  .brand-logo { margin: 0 auto 14px; line-height: 0; }
  .brand-logo img, .brand-logo svg {
    width: 150px; max-width: 48vw; height: auto; display: block; margin: 0 auto;
    filter:
      drop-shadow(0 0 34px rgba(255, 94, 58, 0.40))
      drop-shadow(0 10px 26px rgba(0, 0, 0, 0.55));
  }
  .brand {
    margin: 0; font-weight: 900; font-size: 2.6rem; letter-spacing: 1px; line-height: 1.05;
    text-shadow: 0 0 26px rgba(255, 94, 58, 0.6), 0 0 3px rgba(255, 138, 92, 0.7);
  }
  .brand .dot { color: var(--neon); }
  .tagline {
    margin-top: 10px; color: var(--text-dim); font-size: 0.98rem; font-weight: 400;
    text-shadow: 0 1px 10px rgba(0, 0, 0, 0.65);
  }

  .actions { width: 100%; display: flex; flex-direction: column; gap: 13px; }

  .btn {
    display: flex; align-items: center; gap: 14px;
    width: 100%;
    padding: 17px 20px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: rgba(20, 20, 32, 0.7);
    color: var(--text);
    text-decoration: none;
    font-size: 1.06rem; font-weight: 600;
    cursor: pointer;
    transition: transform .2s var(--ease), border-color .25s var(--ease),
      background .25s var(--ease), box-shadow .3s var(--ease);
  }
  .btn .ic { width: 26px; height: 26px; flex: 0 0 auto; color: var(--neon-soft); display: grid; place-items: center; }
  .btn .ic svg { width: 24px; height: 24px; }
  .btn .label { flex: 1; text-align: start; }
  .btn .arrow { width: 18px; height: 18px; color: var(--text-faint); transition: transform .25s var(--ease), color .25s var(--ease); }
  .btn:hover { border-color: var(--line-strong); background: var(--bg-elev-2); transform: translateY(-2px); }
  .btn:hover .arrow { color: var(--neon-soft); }
  .btn:active { transform: translateY(0) scale(0.99); }

  /* hero = digital menu */
  .btn.hero {
    background: linear-gradient(135deg, var(--neon), var(--neon-soft));
    border-color: transparent;
    color: #fff;
    font-weight: 700;
    box-shadow: var(--glow);
  }
  .btn.hero .ic, .btn.hero .arrow { color: #fff; }
  .btn.hero:hover { box-shadow: 0 0 36px rgba(255, 94, 58, 0.7); background: linear-gradient(135deg, #ff6a47, #ff9568); }

  footer { text-align: center; color: var(--text-faint); font-size: 0.82rem; padding: 0 16px 26px; }

  /* ---- entrance animation ---- */
  .anim { opacity: 0; transform: translateY(16px); }
  .ready .anim { animation: rise .7s var(--ease) forwards; animation-delay: var(--d, 0ms); }
  @keyframes rise { to { opacity: 1; transform: none; } }
  .ready .brand-logo { animation: bloom 1s var(--ease) forwards; }
  @keyframes bloom {
    0%   { opacity: 0; transform: scale(0.82); }
    60%  { opacity: 1; }
    100% { opacity: 1; transform: scale(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .anim { opacity: 1 !important; transform: none !important; animation: none !important; }
    .brand-logo { animation: none !important; opacity: 1 !important; }
    body::after { animation: none; }
  }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="lang" id="lang">
    <button class="globe" id="globeBtn" aria-label="Language" aria-expanded="false" aria-haspopup="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"></circle>
        <path d="M3 12h18"></path>
        <path d="M12 3c2.5 2.5 3.8 5.8 3.8 9S14.5 18.5 12 21C9.5 18.5 8.2 15.2 8.2 12S9.5 5.5 12 3z"></path>
      </svg>
    </button>
    <div class="lang-menu" id="langMenu" role="menu"></div>
  </div>

  <main>
    <div class="brandwrap">
      <div class="brand-logo" aria-hidden="true">
        <svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="ay-face" cx="42%" cy="33%" r="78%">
              <stop offset="0" stop-color="#eccb95"/><stop offset="46%" stop-color="#cf9456"/><stop offset="100%" stop-color="#794c24"/>
            </radialGradient>
            <linearGradient id="ay-rim" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#e6ba7c"/><stop offset="50%" stop-color="#9c6630"/><stop offset="100%" stop-color="#5b3a1a"/>
            </linearGradient>
            <linearGradient id="ay-letter" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#fce7c4"/><stop offset="100%" stop-color="#d59b54"/>
            </linearGradient>
          </defs>
          <circle cx="240" cy="240" r="234" fill="url(#ay-rim)"/>
          <circle cx="240" cy="240" r="234" fill="none" stroke="#4d3014" stroke-width="2" opacity=".55"/>
          <circle cx="240" cy="240" r="214" fill="none" stroke="#3c2510" stroke-width="13" stroke-dasharray="1.5 11" stroke-linecap="round" opacity=".5"/>
          <circle cx="240" cy="240" r="203" fill="url(#ay-face)"/>
          <circle cx="240" cy="240" r="184" fill="none" stroke="#6c431f" stroke-width="2.4" opacity=".6"/>
          <g fill="#5d3a1a">
            <path d="M240 92 l7.5 24 24 7.5 -24 7.5 -7.5 24 -7.5 -24 -24 -7.5 24 -7.5 z"/>
            <circle cx="196" cy="123" r="3"/><circle cx="284" cy="123" r="3"/>
            <path d="M150 312 l6 6 -6 6 -6 -6 z"/><path d="M330 312 l6 6 -6 6 -6 -6 z"/>
            <circle cx="216" cy="336" r="2.4"/><circle cx="240" cy="336" r="2.4"/><circle cx="264" cy="336" r="2.4"/>
          </g>
          <text x="240" y="262" text-anchor="middle" font-family="Rubik, system-ui, sans-serif" font-weight="800" font-size="70" fill="#46290f" opacity=".5">אייכה בר</text>
          <text x="240" y="259" text-anchor="middle" font-family="Rubik, system-ui, sans-serif" font-weight="800" font-size="70" fill="url(#ay-letter)">אייכה בר</text>
          <text x="240" y="306" text-anchor="middle" font-family="Rubik, system-ui, sans-serif" font-weight="700" font-size="27" letter-spacing="7" fill="#5d3a1a">AYEKA BAR</text>
          <text x="240" y="364" text-anchor="middle" font-family="Rubik, system-ui, sans-serif" font-weight="600" font-size="15" letter-spacing="2.3" fill="#5d3a1a">PREMIUM COCKTAIL LOUNGE</text>
        </svg>
      </div>
      <h1 class="brand anim" id="brand" style="--d:90ms">אייכה<span class="dot"> ·</span> בר</h1>
      <p class="tagline anim" id="tagline" style="--d:180ms"></p>
    </div>

    <nav class="actions" id="actions" aria-label="links"></nav>
  </main>

  <footer class="anim" id="footer" style="--d:620ms"></footer>

  <script src="portal.js"></script>
</body>
</html>
